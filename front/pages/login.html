<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login • Reciclagem Sustentável IPIL </title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?
        family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/login-cadastro.css">

        <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon_io/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon_io/favicon-16x16.png">
        <link rel="manifest" href="../img/favicon_io/site.webmanifest">    
    </head>
    <body>
        <div class="login">
            <div class="flex flex-col items-center gap-1">
                <div class="logo">
                    <img src="../img/logo2.png" alt="Reciclagem Sustentável IPIL logo" class="logo-img">
                </div>
                <h2 class="text-green-700 font-semibold text-2xl">Login</h2>
            </div>
            <form>
                <div class="campo">
                    <label>Email</label>
                    <input type="email" placeholder="Digite o seu email" required>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite a sua senha" required>
                </div>

                <button class="botao"> Entrar no Sistema </button>
            </form>

            <div class="extra">Não tem uma conta? <a href="cadastro.html">Criar nova conta</a> </div>
        </div>
    </body>
</html>
