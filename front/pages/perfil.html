<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil • Reciclagem Sustentável IPIL</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/perfil.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
        
        <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon_io/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon_io/favicon-16x16.png">
        <link rel="manifest" href="../img/favicon_io/site.webmanifest">
    </head>
    <body>
        <script src="../components/header.js"></script>

        <main>
            <script src="../components/sidebar.js"></script>

            <div class="container">
                <div class="perfil-box">
                    <div class="card-perfil">
                        <div class="avatar" id="avatar">  </div>
                        <div class="nome" id="user_name">  </div>
                        <div class="email" id="user_email">  </div>
                        <div class="nivel" id="user_level">  </div>

                        <div class="mt-5">
                            <button id="logout_btn" class="bg-red-500 text-white py-2 px-4 rounded-full hover:bg-red-400">Fazer Log Out</button>
                        </div>
                    </div>

                    <div>
                        <div class="stats">
                            <div class="card">
                                <h3>Pontos Totais</h3>
                                <p id="pontos">4.850</p>
                            </div>
                            <div class="card">
                                <h3>Total Reciclado</h3>
                                <p id="total_reciclado">128 Kg</p>
                            </div>
                            <div class="card">
                                <h3>Coletas Realizadas</h3>
                                <p id="coletas_realizadas">42</p>
                            </div>
                            <div class="card">
                                <h3>Posição no Ranking</h3>
                                <p id="ranking">#1</p>
                            </div>
                        </div>

                        <div class="atividade" id="atividades">
                            <h2>Últimas Atividades</h2>                            
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="../JS/perfil.js"></script>
    </body>
</html>
