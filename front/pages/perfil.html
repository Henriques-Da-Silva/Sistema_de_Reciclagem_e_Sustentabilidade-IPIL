<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil • Reciclagem Sustentável IPIL</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/perfil.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    </head>
    <body>
        <script src="../components/header.js"></script>

        <main>
            <script src="../components/sidebar.js"></script>

            <div class="container">
                <div class="perfil-box">
                    <div class="card-perfil">
                        <div class="avatar"> K </div>
                        <div class="nome"> Kelson Lar </div>

                        <div class="nivel"> Reciclador Lendário </div>
                    </div>

                    <div>
                        <div class="stats">
                            <div class="card">
                                <h3>Pontos Totais</h3>
                                <p>4.850</p>
                            </div>
                            <div class="card">
                                <h3>Total Reciclado</h3>
                                <p>128 Kg</p>
                            </div>
                            <div class="card">
                                <h3>Coletas Realizadas</h3>
                                <p>42</p>
                            </div>
                            <div class="card">
                                <h3>Posição no Ranking</h3>
                                <p>#1</p>
                            </div>
                        </div>

                        <div class="atividade">
                            <h2>Últimas Atividades</h2>
                            <div class="item">
                                <div class="material">
                                    Garrafas Plásticas
                                </div>
                                <div class="data">

                            </div>

                                <div class="material">
                                    Papelão
                                </div>
                                <div class="data">
                                    8 Kg • 08/05/2026

                                <div class="material">
                                    Latas
                                </div>
                                <div class="data">
                                    5 Kg • 05/05/2026
                                </div>
                            </div>
                            <div class="item">
                                <div class="material">
                                    Vidro
                                </div>
                                <div class="data">
                                    15 Kg • 01/05/2026
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </body>
</html>
