<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Histórico • Reciclagem Sustentável IPIL</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/history.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    </head>
    <body>
        <script src="../components/header.js"></script>

        <main>
            <script src="../components/sidebar.js"></script>

            <div class="container">
                <div class="tabela-box">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Material</th>
                                <th>Quantidade</th>
                                <th>Pontos Ganhos</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>10/05/2026</td>
                                <td>Garrafas Plásticas</td>
                                <td>12 Kg</td>
                                <td class="pontos">+120 pts</td>
                            </tr>
                            <tr>
                                <td>08/05/2026</td>
                                <td>Papelão</td>
                                <td>7 Kg</td>
                                <td class="pontos">+70 pts</td>
                            </tr>
                            <tr>
                                <td>05/05/2026</td>
                                <td>Latas</td>
                                <td>5 Kg</td>
                                <td class="pontos">+50 pts</td>
                            </tr>
                            <tr>
                                <td>01/05/2026</td>
                                <td>Vidro</td>
                                <td>15 Kg</td>
                                <td class="pontos">+150 pts</td>
                            </tr>
                            <tr>
                                <td>28/04/2026</td>
                                <td>Jornais Antigos</td>
                                <td>4 Kg</td>
                                <td class="pontos">+40 pts</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="area-btn">
                    <button class="btn">
                        Exportar Histórico
                    </button>
                </div>
            </div>
        </main>

    </body>
</html>
