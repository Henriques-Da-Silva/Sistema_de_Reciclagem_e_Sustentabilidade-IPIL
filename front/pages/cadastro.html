<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro • Reciclagem Sustentável IPIL</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?
        family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/login-cadastro.css">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

        <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon_io/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon_io/favicon-16x16.png">
        <link rel="manifest" href="../img/favicon_io/site.webmanifest">
    </head>
    <body>
        <div class="cadastro-box">
            <div class="flex flex-col items-center gap-1">
                <div class="logo">
                    <img src="../img/logo2.png" alt="Reciclagem Sustentável IPIL logo" class="logo-img">
                </div>
                <h2 class="text-green-600 font-semibold text-2xl">Cadastro</h2>
            </div>
            <form id="cadastro_form">
                <div class="campo">
                    <label>Nome completo</label>
                    <input type="text" placeholder="Digite o seu nome" id="nome" required>
                </div>
                <div class="campo">
                    <label>Email</label>
                    <input type="email" placeholder="Digite o seu email" id="email" required>
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Crie uma senha" id="senha" required>
                </div>
                <div class="campo">
                    <label>Confirmar senha</label>
                    <input type="password" placeholder="Repita a senha" id="confirmar_senha" required>
                </div>
                <button class="botao" type="submit"> Criar Conta </button>
            </form>

            <div class="extra">Já tem uma conta? <a href="login.html"> Fazer login </a> </div>
        </div>

    <script src="../JS/cadastro.js"></script>
    </body>
</html>
