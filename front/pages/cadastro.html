<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro • Reciclagem Sustentável IPIL</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?
        family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/login-cadastro.css">
    </head>
    <body>
        <div class="cadastro-box">
            <div class="flex flex-col items-center gap-1">
                <div class="logo">
                    <img src="../img/logo2.png" alt="Reciclagem Sustentável IPIL logo" class="logo-img">
                </div>
                <h2 class="text-green-600 font-semibold text-2xl">Cadastro</h2>
            </div>
            <form>
                <div class="campo">
                    <label>Nome completo</label>
                    <input type="text" placeholder="Digite o seu nome">
                </div>
                <div class="campo">
                    <label>Email</label>
                    <input type="email" placeholder="Digite o seu email">
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Crie uma senha">
                </div>
                <div class="campo">
                    <label>Confirmar senha</label>
                    <input type="password" placeholder="Repita a senha">
                </div>
                <button class="botao"> Criar Conta </button>
            </form>

            <div class="extra">Já tem uma conta? <a href="login.html"> Fazer login </a> </div>
        </div>
    </body>
</html>
