<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nova Coleta • Reciclagem Sustentável IPIL</title>
        <link href="https://fonts.googleapis.com/css2?
        family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
        <link rel="stylesheet" href="../styles/nova_coleta.css">

        <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon_io/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon_io/favicon-16x16.png">
        <link rel="manifest" href="../img/favicon_io/site.webmanifest">
    </head>
    <body>
        <script src="../components/header.js"></script>

        <main>
            <script src="../components/sidebar.js"></script>

            <div class="principal">
                <div class="caixa">
                    <div class="topo">
                        <div class="logo">
                            <img src="../img/logo2.png" alt="Reciclagem Sustentável IPIL" class="logo-img" />
                        </div>
                        <p>Registar Nova Coleta</p>
                    </div>
        
                    <form id="nova_coleta_form">
                        <div class="grupo">
                            <label>Material para reciclagem</label>
                            <select required id="materiais_select">  </select>
                        </div>
                        <div class="grupo">
                            <label>Quantidade (Kg)</label>
                            <input id="quantidade" type="number" min="0" step="0.1" placeholder="Digite a quantidade" required>
                        </div>
                        <button class="btn"> Confirmar Coleta </button>
                    </form>
                    <div class="voltar"> <a href="dashboard.html"> Voltar ao Dashboard </a> </div>
                </div>
            </div>
        </main>

        <script src="../config.js"></script>
        <script src="../JS/nova_coleta.js"></script>
    </body>
</html>
