<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • Reciclagem Sustentável IPIL</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../styles/global.css">

    <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="../img/favicon_io/site.webmanifest">
</head>

<body class="bg-green-50 min-h-screen flex flex-col">

    <script src="../components/header.js"></script>

    <main class="flex-1 p-3 md:p-8">

        <script src="../components/sidebar.js"></script>

        <div class="flex flex-col mb-8 gap-1.25">
            <h1 class="text-3xl font-bold">Olá, <span id="usuario_nome"></span>!</h1>
            <h3 class="text-lg text-gray-600 font-semibold">Veja seu impacto de hoje</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            
            <div class="bg-white p-6 rounded-2xl shadow hover:-translate-y-1 transition">
                <h3 class="text-gray-500 text-sm mb-2">Pontuação do Usuário</h3>
                <p class="text-3xl font-bold text-green-600"><span id="pontos"></span> pts</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow hover:-translate-y-1 transition">
                <h3 class="text-gray-500 text-sm mb-2">Total Reciclado</h3>
                <p class="text-3xl font-bold text-green-600"><span id="total_reciclado"></span> Kg</p>
            </div>

        </div>

        <div class="bg-white p-6 rounded-2xl shadow mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Últimos Objetos Reciclados</h2>

            <ul class="space-y-3" id="coletas"> </ul>
        </div>

        <div class="flex justify-end">
            <a href="../pages/nova_coleta.html">
                <button class="bg-gradient-to-r from-green-600 to-green-500 text-white px-6 py-3 rounded-xl font-semibold shadow hover:-translate-y-1 transition">
                    Reciclar Novo Objeto
                </button>
            </a>
        </div>

    </main>

    <script src="../config.js"></script>
    <script src="../JS/dashboard.js"></script>
</body>
</html>
