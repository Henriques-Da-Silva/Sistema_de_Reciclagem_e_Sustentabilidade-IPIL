<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • Reciclagem Sustentável IPIL</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../styles/global.css">
</head>

<body class="bg-green-50 min-h-screen flex flex-col">

    <script src="../components/header.js"></script>

    <main class="flex-1 p-3 md:p-8">

        <script src="../components/sidebar.js"></script>

        <div class="flex flex-col mb-8 gap-1.25">
            <h1 class="text-3xl font-bold">Olá, Usuário!</h1>
            <h3 class="text-lg text-gray-600 font-semibold">Veja seu impacto de hoje</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            
            <div class="bg-white p-6 rounded-2xl shadow hover:-translate-y-1 transition">
                <h3 class="text-gray-500 text-sm mb-2">Pontuação do Usuário</h3>
                <p class="text-3xl font-bold text-green-600">1.250 pts</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow hover:-translate-y-1 transition">
                <h3 class="text-gray-500 text-sm mb-2">Total Reciclado</h3>
                <p class="text-3xl font-bold text-green-600">84 Kg</p>
            </div>

        </div>

        <div class="bg-white p-6 rounded-2xl shadow mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Últimos Objetos Reciclados</h2>

            <ul class="space-y-3">
                <li class="flex justify-between items-center bg-gray-100 p-4 rounded-lg">
                    <span class="font-medium">Garrafas Plásticas</span>
                    <span class="text-green-600 font-semibold">+50 pts</span>
                </li>

                <li class="flex justify-between items-center bg-gray-100 p-4 rounded-lg">
                    <span class="font-medium">Latas de Refrigerante</span>
                    <span class="text-green-600 font-semibold">+35 pts</span>
                </li>

                <li class="flex justify-between items-center bg-gray-100 p-4 rounded-lg">
                    <span class="font-medium">Caixas de Papelão</span>
                    <span class="text-green-600 font-semibold">+70 pts</span>
                </li>

                <li class="flex justify-between items-center bg-gray-100 p-4 rounded-lg">
                    <span class="font-medium">Jornais Antigos</span>
                    <span class="text-green-600 font-semibold">+20 pts</span>
                </li>

            </ul>
        </div>

        <div class="flex justify-end">
            <button class="bg-gradient-to-r from-green-600 to-green-500 text-white px-6 py-3 rounded-xl font-semibold shadow hover:-translate-y-1 transition">
                Reciclar Novo Objeto
            </button>
        </div>

    </main>

</body>
</html>
